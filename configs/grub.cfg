#
set pref=/boot/grub
set default="0"
set timeout="30"

# Load graphics (only corresponding ones will be found)
# (U)EFI
insmod efi_gop
insmod efi_uga
if [ x$feature_default_font_path = xy ] ; then
   font=unicode
else
   font=$prefix/unifont.pf2
fi

# Workaround to avoid no video output on some systems
echo "Loading bootloader..."

if loadfont $font; then
  set gfxmode=auto
  insmod gfxterm
  set lang=en_US
  terminal_output gfxterm
fi
set hidden_timeout_quiet=false

insmod png
if background_image $pref/ocswp-grub2.png; then
  set color_normal=black/black
  set color_highlight=magenta/black
else
  set color_normal=cyan/blue
  set color_highlight=white/blue
fi

# Decide if the commands: linux/initrd (default) or linuxefi/initrdefi
set linux_cmd=linux
set initrd_cmd=initrd
export linux_cmd initrd_cmd

insmod play
play 960 440 1 0 4 440 1

# =============================================
#  AUCOOP Recovery & Live Boot Menu
# =============================================

menuentry "Try AUCOOP Linux Image (live session, no changes to disk)" --id try-aucoop {
  search --set -f /casper/vmlinuz
  $linux_cmd /casper/vmlinuz boot=casper live-media-path=/casper username=aucoop hostname=aucoop-desktop quiet splash ---
  $initrd_cmd /casper/initrd.img
}

menuentry "Install AUCOOP (restore image to disk)" --id install-aucoop {
  search --set -f /live/vmlinuz
  $linux_cmd /live/vmlinuz boot=live union=overlay noswap edd=on nomodeset enforcing=0 locales=en_US.UTF-8 keyboard-layouts=NONE ocs_live_run="custom-ocs" ocs_live_extra_param="-x --restore-only" ocs_live_batch="no" vga=788 net.ifnames=0 nosplash i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  $initrd_cmd /live/initrd.img
}

menuentry "Local operating system (if available)" --id local-disk {
  echo "Booting first local disk..."
  configfile /boot/grub/boot-local-efi.cfg
  echo "No uEFI boot loader was found!"
  sleep 15
}

submenu 'Advanced options...' {
  menuentry "Install AUCOOP (load to RAM first, then restore)" --id install-toram {
    search --set -f /live/vmlinuz
    $linux_cmd /live/vmlinuz boot=live union=overlay noswap edd=on nomodeset enforcing=0 locales=en_US.UTF-8 keyboard-layouts=NONE ocs_live_run="custom-ocs" ocs_live_extra_param="-x --restore-only" ocs_live_batch="no" vga=788 toram=live,syslinux,EFI,boot,.disk,utils net.ifnames=0 nosplash i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
    $initrd_cmd /live/initrd.img
  }

  menuentry "Install AUCOOP (safe graphics, failsafe mode)" --id install-failsafe {
    search --set -f /live/vmlinuz
    $linux_cmd /live/vmlinuz boot=live union=overlay noswap edd=on nomodeset enforcing=0 locales=en_US.UTF-8 keyboard-layouts=NONE ocs_live_run="custom-ocs" ocs_live_extra_param="-x --restore-only" ocs_live_batch="no" acpi=off irqpoll noapic noapm nodma nomce nolapic nosmp net.ifnames=0 nomodeset vga=normal nosplash
    $initrd_cmd /live/initrd.img
  }

  menuentry "Try AUCOOP Linux Image (safe graphics)" --id try-aucoop-safe {
    search --set -f /casper/vmlinuz
    $linux_cmd /casper/vmlinuz boot=casper live-media-path=/casper username=aucoop hostname=aucoop-desktop nomodeset quiet splash ---
    $initrd_cmd /casper/initrd.img
  }

  menuentry "Memtester (RAM diagnostics)" --id memtester {
    search --set -f /live/vmlinuz
    $linux_cmd /live/vmlinuz boot=live union=overlay noswap edd=on nomodeset enforcing=0 locales=en_US.UTF-8 keyboard-layouts=NONE ocs_live_run="custom-ocs" ocs_live_extra_param="-x --restore-only" ocs_live_batch="no" vga=788 toram=live,syslinux,EFI,boot,.disk,utils net.ifnames=0 nosplash i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1 init=/bin/bash -- -c "/sbin/ocs-memtester"
    $initrd_cmd /live/initrd.img
  }

  menuentry "Network boot via iPXE" {
    search --no-floppy --set=root -f /live/ipxe.efi
    chainloader /live/ipxe.efi + 1
  }
}

menuentry 'uEFI firmware setup' 'uefi-firmware' {
  echo "Entering uEFI firmware setup..."
  fwsetup
}
