default vesamenu.c32
timeout 300
prompt 0
noescape 1
MENU MARGIN 5
 MENU BACKGROUND ocswp.png
 MENU COLOR UNSEL 7;32;41 #c0000090 #00000000
 MENU COLOR TIMEOUT_MSG 7;32;41 #c0000090 #00000000
 MENU COLOR TIMEOUT 7;32;41 #c0000090 #00000000
 MENU COLOR HELP 7;32;41 #c0000090 #00000000

ALLOWOPTIONS 1

MENU TITLE AUCOOP Recovery & Live Boot

label Try AUCOOP
  MENU DEFAULT
  MENU LABEL ^Try AUCOOP Linux Image (live session, no changes to disk)
  kernel /casper/vmlinuz
  append initrd=/casper/initrd.img boot=casper live-media-path=/casper username=aucoop hostname=aucoop-desktop quiet splash ---
  TEXT HELP
  Boot AUCOOP Linux Mint in a live session.
  No changes will be made to the hard drive.
  ENDTEXT

label Install AUCOOP
  MENU LABEL ^Install AUCOOP (restore image to disk)
  kernel /live/vmlinuz
  append initrd=/live/initrd.img boot=live union=overlay noswap edd=on nomodeset enforcing=0 noeject locales=en_US.UTF-8 keyboard-layouts=NONE ocs_live_run="custom-ocs" ocs_live_extra_param="-x --restore-only" ocs_live_batch="no" vga=788 net.ifnames=0 nosplash i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  TEXT HELP
  Restore the AUCOOP image to the internal hard drive.
  WARNING: This will erase all data on the target disk!
  ENDTEXT

label local
  MENU LABEL Local operating system in harddrive (if available)
  kernel chain.c32
  append hd0
  TEXT HELP
  Boot local OS from first hard disk if it's available
  ENDTEXT

MENU BEGIN Advanced options...

label Install AUCOOP ToRAM
  MENU LABEL Install AUCOOP (load to ^RAM first, then restore)
  kernel /live/vmlinuz
  append initrd=/live/initrd.img boot=live union=overlay noswap edd=on nomodeset enforcing=0 noeject locales=en_US.UTF-8 keyboard-layouts=NONE ocs_live_run="custom-ocs" ocs_live_extra_param="-x --restore-only" ocs_live_batch="no" vga=788 toram=live,syslinux,EFI,boot,.disk,utils net.ifnames=0 nosplash i915.blacklist=yes radeonhd.blacklist=yes nouveau.blacklist=yes vmwgfx.enable_fbdev=1
  TEXT HELP
  Load everything to RAM first, then restore.
  You can remove the USB drive during restore.
  ENDTEXT

label Install AUCOOP failsafe
  MENU LABEL Install AUCOOP (safe graphics, ^failsafe mode)
  kernel /live/vmlinuz
  append initrd=/live/initrd.img boot=live union=overlay noswap edd=on nomodeset enforcing=0 noeject locales=en_US.UTF-8 keyboard-layouts=NONE ocs_live_run="custom-ocs" ocs_live_extra_param="-x --restore-only" ocs_live_batch="no" acpi=off irqpoll noapic noapm nodma nomce nolapic nosmp net.ifnames=0 nomodeset vga=normal nosplash
  TEXT HELP
  Failsafe mode with all hardware workarounds enabled.
  ENDTEXT

label Try AUCOOP safe
  MENU LABEL Try AUCOOP Linux Image (^safe graphics)
  kernel /casper/vmlinuz
  append initrd=/casper/initrd.img boot=casper live-media-path=/casper username=aucoop hostname=aucoop-desktop nomodeset quiet splash ---
  TEXT HELP
  Live session with safe graphics (nomodeset).
  ENDTEXT

label iPXE
  MENU LABEL ^Network boot via iPXE
  kernel /live/ipxe.lkn
  TEXT HELP
  Run iPXE to enable network (PXE) boot
  ENDTEXT

MENU END
